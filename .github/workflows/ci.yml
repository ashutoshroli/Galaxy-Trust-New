name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (syntax + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all backend source files
        run: |
          set -e
          find . -name '*.js' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -n1 node --check

      - name: Boot smoke test (server starts, then shuts down cleanly)
        env:
          JWT_SECRET: ci_test_secret_at_least_16_chars
          DATABASE_URL: postgres://user:pass@localhost:5432/nonexistent
          PORT: 3999
        run: |
          set -e
          timeout 5 node server.js > boot.log 2>&1 &
          pid=$!
          sleep 2
          curl -sf -o /dev/null http://localhost:3999/api/health || true
          curl -s http://localhost:3999/api/does-not-exist | grep -q '"error"'
          kill $pid 2>/dev/null || true
          wait $pid 2>/dev/null || true
          cat boot.log

      - name: Audit dependencies (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high

  frontend:
    name: Frontend (build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Audit dependencies (high+ severity)
        run: npm audit --audit-level=high
